<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0,
        maximum-scale=1.0, user-scalable=no" />
  <title>Superset Dashboard</title>
  <meta name="color-scheme" content="light" />
  <script src="https://unpkg.com/@superset-ui/embedded-sdk"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body class="light">
  <div id="superset-mount"></div>
  <div id="_bridge_loading">Loading dashboard…</div>
  <div id="_bridge_error"></div>
  <script src="bridge.js"></script>
  <script>
    var SUPERSET_DOMAIN = 'https://superset.example.com';
    var DASHBOARD_UUID  = 'your-dashboard-uuid';         
    var THEME           = document.body.classList.contains('dark') ? 'dark' : 'light';
    var SITE_IDS        = null;

    SupersetBridge.initWithTokenFetch(
      DASHBOARD_UUID,
      SUPERSET_DOMAIN,
      THEME,
      SITE_IDS,
      true,
      false,
      true
    );
  </script>

</body>
</html>
